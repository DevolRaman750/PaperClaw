services:
  postgres:
    image: postgres:15
    container_name: builder_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: builder_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: builder_redis
    ports:
      - "6380:6379"

volumes:
  postgres_data: